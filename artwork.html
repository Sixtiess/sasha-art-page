<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Artwork | Earth & Echoes</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <header class="site-header">
      <a class="logo" href="index.html">Earth & Echoes</a>
      <button class="menu-toggle" aria-expanded="false" aria-label="Toggle navigation">☰</button>
      <nav class="site-nav">
        <a href="index.html">Home</a>
        <a href="gallery.html" aria-current="page">Gallery</a>
        <a href="about.html">About</a>
        <a href="contact.html">Contact</a>
      </nav>
    </header>

    <main class="section reveal artwork-layout" id="artwork-page">
      <a class="back-link" href="gallery.html">← Back to Gallery</a>
      <h1 id="artwork-title">Piece</h1>

      <div class="artwork-grid">
        <div class="artwork-image-wrap">
          <img id="artwork-image" src="https://placehold.co/1200x900/d3d3d3/6b6b6b?text=Piece" alt="Artwork placeholder" />
        </div>

        <article class="artwork-notes">
          <h2>Piece Details</h2>
          <p><strong>Medium:</strong> <span id="artwork-medium"></span></p>
          <p><strong>Size:</strong> <span id="artwork-size"></span></p>
          <p><strong>Year:</strong> <span id="artwork-year"></span></p>
          <p><strong>Current stage:</strong> <span id="artwork-stage"></span></p>

          <h2>Story Behind This Piece</h2>
          <p id="artwork-story"></p>
        </article>
      </div>
    </main>

    <footer class="site-footer">
      <p>© 2026 Earth & Echoes · Personal project · Made with love ♡</p>
    </footer>

    <script src="artworks.js"></script>
    <script src="script.js"></script>
  </body>
</html>
