<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Contact | Earth & Echoes</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <header class="site-header">
      <a class="logo" href="index.html">Earth & Echoes</a>
      <button class="menu-toggle" aria-expanded="false" aria-label="Toggle navigation">☰</button>
      <nav class="site-nav">
        <a href="index.html">Home</a>
        <a href="gallery.html">Gallery</a>
        <a href="about.html">About</a>
        <a href="contact.html" aria-current="page">Contact</a>
      </nav>
    </header>

    <main class="section reveal contact-layout">
      <div>
        <p class="eyebrow">Say hello</p>
        <h1>Contact</h1>
        <p>If you want to chat about the work or leave a note, I’d love to hear from you.</p>
        <p><strong>Email:</strong> hello@earthandechoes.art</p>
        <p><strong>Instagram:</strong> @earthandechoes</p>
      </div>

      <form class="contact-form" action="#" method="post">
        <label>
          Name
          <input type="text" name="name" placeholder="Your name" required />
        </label>
        <label>
          Email
          <input type="email" name="email" placeholder="you@example.com" required />
        </label>
        <label>
          Message
          <textarea name="message" rows="5" placeholder="Write your message..." required></textarea>
        </label>
        <button class="button" type="submit">Send Message</button>
      </form>
    </main>

    <footer class="site-footer">
      <p>© 2026 Earth & Echoes · Personal project · Made with love ♡</p>
    </footer>

    <script src="script.js"></script>
  </body>
</html>
