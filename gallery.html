<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Gallery | Earth & Echoes</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <header class="site-header">
      <a class="logo" href="index.html">Earth & Echoes</a>
      <button class="menu-toggle" aria-expanded="false" aria-label="Toggle navigation">☰</button>
      <nav class="site-nav">
        <a href="index.html">Home</a>
        <a href="gallery.html" aria-current="page">Gallery</a>
        <a href="about.html">About</a>
        <a href="contact.html">Contact</a>
      </nav>
    </header>

    <main class="section reveal">
      <p class="eyebrow">Collection</p>
      <h1>Gallery</h1>
      <p class="intro">Pieces inspired by Santa Barbara’s coast, canyons, palms, and changing light.</p>

      <div class="filters" role="toolbar" aria-label="Gallery filters">
        <button class="filter active" data-filter="all">All</button>
        <button class="filter" data-filter="set-a">Set A</button>
        <button class="filter" data-filter="set-b">Set B</button>
        <button class="filter" data-filter="set-c">Set C</button>
      </div>

      <section class="card-grid gallery-grid" id="gallery-grid"></section>
    </main>

    <footer class="site-footer">
      <p>© 2026 Earth & Echoes · Personal project · Made with love ♡</p>
    </footer>

    <script src="artworks.js"></script>
    <script src="script.js"></script>
  </body>
</html>
